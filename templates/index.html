<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sil-ai PM Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1e1e2e',
            panel: '#282840',
            accent: '#7c3aed',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .spinner { border: 3px solid #444; border-top-color: #7c3aed; border-radius: 50%; width: 28px; height: 28px; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-btn.active { background: #7c3aed; color: white; }
    .priority-p0 { color: #ef4444; font-weight: 700; }
    .priority-p1 { color: #f59e0b; font-weight: 600; }
    .priority-p2 { color: #3b82f6; }
    .priority-p3 { color: #6b7280; }
    .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .modal-body { max-height: 80vh; overflow-y: auto; }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  </style>
</head>
<body class="bg-surface text-gray-200 min-h-screen">

  <!-- Header -->
  <header class="bg-panel border-b border-gray-700 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-white">sil-ai <span class="text-accent">PM Dashboard</span></h1>
    <span class="text-sm text-gray-500" id="timestamp"></span>
  </header>

  <!-- Tabs -->
  <nav class="bg-panel border-b border-gray-700 px-6 py-2 flex gap-2 flex-wrap">
    <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium transition" data-tab="weekly">Weekly Summary</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white transition" data-tab="overdue">Overdue</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white transition" data-tab="priorities">Priorities</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white transition" data-tab="pr-status">PR Status</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white transition" data-tab="repo-status">Repo Status</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white transition" data-tab="my-tasks">My Tasks</button>
  </nav>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-start justify-center pt-12">
    <div class="bg-surface border border-gray-700 rounded-2xl shadow-2xl w-full max-w-4xl mx-4">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
        <h3 id="modal-title" class="text-xl font-bold text-white"></h3>
        <button id="modal-close" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Content -->
  <main class="max-w-7xl mx-auto p-6">
    <div id="loading" class="hidden flex items-center gap-3 py-12 justify-center">
      <div class="spinner"></div>
      <span class="text-gray-400">Loading data...</span>
    </div>
    <div id="refreshing" class="hidden fixed top-2 right-4 bg-panel border border-gray-600 rounded-lg px-3 py-1.5 text-xs text-gray-400 flex items-center gap-2 z-40">
      <div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> Refreshing...
    </div>
    <div id="content"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
