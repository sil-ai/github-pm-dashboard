<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sil-ai PM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#12131a',
            panel: '#1a1b26',
            border: '#2a2b3d',
            accent: '#818cf8',
            'accent-dim': '#6366f1',
            muted: '#565a7e',
          },
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; }

    /* Spinner */
    .spinner {
      border: 2px solid rgba(129,140,248,0.15);
      border-top-color: #818cf8;
      border-radius: 50%;
      width: 24px; height: 24px;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    .tab-btn { position: relative; color: #565a7e; }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%; right: 50%;
      height: 2px;
      background: #818cf8;
      transition: left 0.2s, right 0.2s;
      border-radius: 1px;
    }
    .tab-btn.active { color: #e2e4f0; }
    .tab-btn.active::after { left: 0; right: 0; }
    .tab-btn:hover { color: #c5c7de; }

    /* Priorities */
    .priority-p0 { color: #f87171; font-weight: 600; }
    .priority-p1 { color: #fbbf24; font-weight: 500; }
    .priority-p2 { color: #60a5fa; }
    .priority-p3 { color: #6b7280; }

    /* Modal */
    .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
    .modal-body { max-height: 80vh; overflow-y: auto; }
    .modal-body::-webkit-scrollbar { width: 5px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: #2a2b3d; border-radius: 3px; }
    .modal-body::-webkit-scrollbar-thumb:hover { background: #3a3b5d; }

    /* Content transitions */
    #content { animation: fadeUp 0.25s ease-out; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Smooth link hover */
    a { transition: color 0.15s; }

    /* Selection */
    ::selection { background: rgba(129,140,248,0.25); }
  </style>
</head>
<body class="bg-surface text-gray-300 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-panel/80 backdrop-blur-md border-b border-border px-6 py-4 flex items-center justify-between sticky top-0 z-30">
    <h1 class="text-lg font-semibold tracking-tight text-gray-100">sil-ai <span class="text-accent font-bold">PM Dashboard</span></h1>
    <span class="text-xs text-muted tabular-nums" id="timestamp"></span>
  </header>

  <!-- Tabs + Date Range -->
  <nav class="bg-panel/60 backdrop-blur-sm border-b border-border px-6 py-0 flex items-center justify-between sticky top-[57px] z-20">
    <div class="flex gap-1 flex-wrap">
      <button class="tab-btn active px-4 py-3 text-sm font-medium transition-colors" data-tab="summary">Summary</button>
      <button class="tab-btn px-4 py-3 text-sm font-medium transition-colors" data-tab="overdue">Overdue</button>
      <button class="tab-btn px-4 py-3 text-sm font-medium transition-colors" data-tab="priorities">Priorities</button>
      <button class="tab-btn px-4 py-3 text-sm font-medium transition-colors" data-tab="pr-status">PR Status</button>
      <button class="tab-btn px-4 py-3 text-sm font-medium transition-colors" data-tab="repo-status">Repo Status</button>
      <button class="tab-btn px-4 py-3 text-sm font-medium transition-colors" data-tab="my-tasks">My Tasks</button>
    </div>
    <div class="flex items-center gap-2 text-sm py-2">
      <button id="range-prev" class="text-muted hover:text-gray-200 transition-colors px-1.5">&larr;</button>
      <span id="range-label" class="text-gray-400 tabular-nums text-xs min-w-[140px] text-center"></span>
      <button id="range-next" class="text-muted hover:text-gray-200 transition-colors px-1.5">&rarr;</button>
      <select id="range-period" class="bg-panel border border-border text-gray-300 rounded-md px-2 py-1 text-xs ml-1 cursor-pointer focus:outline-none focus:border-accent/50">
        <option value="7">1 week</option>
        <option value="14">2 weeks</option>
        <option value="30">1 month</option>
      </select>
    </div>
  </nav>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-start justify-center pt-10">
    <div class="bg-panel border border-border rounded-2xl shadow-2xl shadow-black/40 w-full max-w-4xl mx-4">
      <div class="flex items-center justify-between px-6 py-4 border-b border-border">
        <h3 id="modal-title" class="text-lg font-semibold text-gray-100"></h3>
        <button id="modal-close" class="text-muted hover:text-gray-200 text-xl leading-none transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">&times;</button>
      </div>
      <div id="modal-body" class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Content -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="hidden flex items-center gap-3 py-16 justify-center">
      <div class="spinner"></div>
      <span class="text-muted text-sm">Loading data...</span>
    </div>
    <div id="refreshing" class="hidden fixed top-2 right-4 bg-panel border border-border rounded-lg px-3 py-1.5 text-xs text-muted flex items-center gap-2 z-40 shadow-lg shadow-black/20">
      <div class="spinner" style="width:12px;height:12px;border-width:1.5px;"></div> Refreshing...
    </div>
    <div id="content"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
